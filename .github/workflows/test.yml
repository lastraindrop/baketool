name: BakeNexus Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        blender-version: ['3.3.21', '3.4.1', '3.5.1', '3.6.23', '4.0.2', '4.1.1', '4.2.14', '4.3.2', '4.4.3', '4.5.3', '5.0.1', '5.1.0']
        include:
          - blender-version: '3.3.21'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender3.3/blender-3.3.21-linux-x64.tar.xz'
          - blender-version: '3.4.1'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender3.4/blender-3.4.1-linux-x64.tar.xz'
          - blender-version: '3.5.1'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender3.5/blender-3.5.1-linux-x64.tar.xz'
          - blender-version: '3.6.23'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender3.6/blender-3.6.23-linux-x64.tar.xz'
          - blender-version: '4.0.2'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender4.0/blender-4.0.2-linux-x64.tar.xz'
          - blender-version: '4.1.1'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender4.1/blender-4.1.1-linux-x64.tar.xz'
          - blender-version: '4.2.14'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender4.2/blender-4.2.14-linux-x64.tar.xz'
          - blender-version: '4.3.2'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender4.3/blender-4.3.2-linux-x64.tar.xz'
          - blender-version: '4.4.3'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender4.4/blender-4.4.3-linux-x64.tar.xz'
          - blender-version: '4.5.3'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender4.5/blender-4.5.3-linux-x64.tar.xz'
          - blender-version: '5.0.1'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender5.0/blender-5.0.1-linux-x64.tar.xz'
          - blender-version: '5.1.0'
            blender-repo: 'https://mirrors.tuna.tsinghua.edu.cn/blender/release/Blender5.1/blender-5.1.0-linux-x64.tar.xz'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Blender
        run: |
          wget -q ${{ matrix.blender-repo }} -O blender.tar.xz
          tar xf blender.tar.xz
          echo "BLENDER_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Setup Virtual Display and Audio
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb pulseaudio
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          pulseaudio --start --exit-idle-time=-1 || true
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run Tests
        run: |
          export DISPLAY=:99
          pip install numpy || true
          ${{ env.BLENDER_DIR }}/blender-*/blender -b --python automation/cli_runner.py -- --json test_report.json --suite all

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.blender-version }}
          path: test_report.json

  verify:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Verification
        run: |
          python -m py_compile automation/*.py
          python -m py_compile test_cases/*.py

      - name: Download Test Reports
        uses: actions/download-artifact@v4
        with:
          pattern: test-report-*
          path: reports
          merge-multiple: true

      - name: Check Results
        run: |
          echo "All test reports downloaded to 'reports/' directory"

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install pycodestyle pydocstyle

      - name: Run linting
        run: |
          pycodestyle --max-line-length=120 --exclude=.venv,__pycache__,docs/legacy . || true

  style-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          find . -name "*.py" -not -path "./.venv/*" -not -path "./.git/*" -exec python -m py_compile {} \;
          echo "All Python files have valid syntax"
